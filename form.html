<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HEADSTART — Client Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:       #E82B2B;
      --red-dark:  #c02020;
      --blue:      #1B1F8A;
      --blue-light:#eaebf8;
      --border:    #e4e4ef;
      --muted:     #6b6b8a;
      --text:      #1a1a2e;
      --bg:        #f7f7fc;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 48px; }

    .form-header {
      background: var(--blue);
      padding: 24px 20px 28px;
      text-align: center;
      position: relative;
    }
    .form-header::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 5px; background: var(--red);
    }
    .form-header-logo {
      width: 110px; height: 110px;
      object-fit: contain;
      margin: 0 auto 8px;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.3));
    }
    .form-header p {
      color: rgba(255,255,255,.65);
      font-size: 13px;
      letter-spacing: .5px;
    }

    .form-container { max-width: 480px; margin: 0 auto; padding: 24px 16px; }
    .form-card {
      background: #fff; border-radius: 16px; padding: 24px;
      box-shadow: 0 2px 16px rgba(27,31,138,.08); border: 1px solid var(--border);
    }
    .form-card-title {
      font-size: 15px; font-weight: 700; color: var(--blue);
      margin-bottom: 20px; padding-bottom: 10px;
      border-bottom: 2px solid var(--red); display: inline-block;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 15px;
      color: var(--text); background: #fff; outline: none; transition: border-color .2s;
      -webkit-appearance: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--blue); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .services-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .service-option {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; cursor: pointer; transition: border-color .2s, background .2s;
      font-size: 14px; font-weight: 600;
    }
    .service-option input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--red);
      flex-shrink: 0; padding: 0; border: none;
    }
    .service-option:has(input:checked) { border-color: var(--red); background: #fdeaea; }
    .service-cat-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--red); margin: 12px 0 6px;
    }

    .submit-btn {
      width: 100%; padding: 14px; background: var(--red); color: #fff;
      border: none; border-radius: 10px; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px;
      transition: background .2s; letter-spacing: .5px;
    }
    .submit-btn:hover { background: var(--red-dark); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }

    .success-screen { display: none; text-align: center; padding: 40px 24px; }
    .success-icon {
      width: 72px; height: 72px; background: #e8f5e9; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 36px;
    }
    .success-screen h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--blue); margin-bottom: 10px; }
    .success-screen p { color: var(--muted); font-size: 14px; line-height: 1.6; }

    .loading-overlay {
      display: none; position: fixed; inset: 0; background: rgba(27,31,138,.3);
      z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(2px);
    }
    .loading-overlay.show { display: flex; }
    .loading-spinner { background: #fff; border-radius: 16px; padding: 28px 36px; text-align: center; font-weight: 700; color: var(--blue); font-size: 15px; }
    .spinner { width: 36px; height: 36px; border: 4px solid var(--blue-light); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .required-note { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .no-services-msg { color: var(--muted); font-size: 14px; padding: 12px 0; font-style: italic; }
  </style>
</head>
